name: Publish to PyPI

on:
  release:
    types: [published]

permissions:
  id-token: write  # Required for Trusted Publisher + Sigstore
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build

      - name: Build package
        run: python -m build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  sign:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # For Sigstore OIDC
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Install sigstore
        run: |
          pip install --upgrade pip
          pip install sigstore --upgrade

      - name: Sign with Sigstore
        run: |
          sigstore sign dist/*

      - name: Upload signed artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-signed
          path: dist/

  publish:
    needs: sign
    runs-on: ubuntu-latest
    environment: pypi  # Create this environment in GitHub repo settings
    permissions:
      id-token: write  # For PyPI Trusted Publisher
    steps:
      - name: Download signed artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist-signed
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # No API token needed — uses OIDC Trusted Publisher
